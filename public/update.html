<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Visionary AI - Démarrage</title>
  <style>
    :root {
      --bg: #000000;
      --surface: #111111;
      --primary: #ffffff;
      --text: #ffffff;
      --text-muted: #888888;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-user-select: none;
      -webkit-app-region: drag;
    }
    .container {
      text-align: center;
      width: 80%;
      max-width: 400px;
    }
    .logo {
      width: 140px;
      height: auto;
      margin-bottom: 32px;
      border-radius: 0;
      box-shadow: none;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    p {
      margin: 0 0 24px 0;
      font-size: 14px;
      color: var(--text-muted);
    }
    .progress-bar-container {
      width: 100%;
      height: 6px;
      background-color: var(--surface);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      background-color: var(--primary);
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px var(--primary);
    }
    .status-text {
      font-size: 12px;
      color: var(--text-muted);
      font-family: monospace;
    }
    .indeterminate .progress-bar {
      width: 50%;
      position: absolute;
      animation: indeterminate 1.5s infinite linear;
    }
    @keyframes indeterminate {
      0% { left: -50%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Logo" class="logo" />
    <h1>Visionary AI</h1>
    <p>Le futur du e-commerce commence ici.</p>
    
    <div class="progress-bar-container indeterminate" id="pb-container">
      <div class="progress-bar" id="pb"></div>
    </div>
    
    <div class="status-text" id="status">Vérification des mises à jour...</div>
  </div>

  <script>
    if (window.updater && window.updater.onUpdateStatus) {
      window.updater.onUpdateStatus((status, progress) => {
        const elStatus = document.getElementById('status');
        const elBar = document.getElementById('pb');
        const elContainer = document.getElementById('pb-container');

        elStatus.textContent = status;

        if (progress !== null && progress !== undefined) {
          elContainer.classList.remove('indeterminate');
          elBar.style.width = Math.min(Math.max(progress, 0), 100) + '%';
        }
      });
    }
  </script>
</body>
</html>
